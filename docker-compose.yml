services:
  app:
    container_name: flowrage_admin_app
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    restart: always
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${AUTH_SECRET} # Use AUTH_SECRET as encryption key for stability
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - SEED_DB=${SEED_DB}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
    volumes:
      - ./uploads:/app/public/uploads
    depends_on:
      - postgres

  postgres:
    container_name: flowrage_admin_db
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - flowrage_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  flowrage_postgres_data:
