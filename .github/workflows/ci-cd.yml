name: Flowrage Admin Panel CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: build_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Lint
      run: npm run lint

    - name: Push schema to test DB
      run: npx prisma db push
      env:
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/build_db"

    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production
        # Mock env vars for build
        DATABASE_URL: "postgresql://postgres:password@localhost:5432/build_db"
        AUTH_SECRET: "mock_secret"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .env
        echo "POSTGRES_USER=${{ secrets.DB_USER }}" >> .env
        echo "POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
        echo "POSTGRES_DB=${{ secrets.DB_NAME }}" >> .env
        echo "DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@postgres:5432/${{ secrets.DB_NAME }}" >> .env
        echo "AUTH_SECRET=${{ secrets.AUTH_SECRET }}" >> .env
        echo "AUTH_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
        echo "NEXTAUTH_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
        echo "NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}" >> .env
        echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
        echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> .env
        echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
        echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> .env
        echo "SMTP_FROM=${{ secrets.SMTP_FROM }}" >> .env
        echo "SEED_DB=${{ secrets.SEED_DB || 'false' }}" >> .env
        # Add Sentry vars if needed, usually they are build time but runtime might need them too
        echo "NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" >> .env

    - name: Copy deployment files to VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        source: "docker-compose.yml,.env"
        target: "/root/flowrage-admin-panel"
        debug: true

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      env:
        CR_PAT: ${{ secrets.GITHUB_TOKEN }}
        CR_USER: ${{ github.actor }}
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        envs: CR_PAT,CR_USER
        script: |
          echo $CR_PAT | docker login ghcr.io -u $CR_USER --password-stdin
          cd /root/flowrage-admin-panel
          # Update images
          docker compose pull
          # Restart services
          docker compose up -d
